name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run HTMLHint
        run: |
          sudo npm install -g htmlhint
          htmlhint ./*.html
      - name: Run JSHint
        run: |
          sudo npm install -g jshint
          jshint ./*.js

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install SASS
        run: npm install -g sass
      
      - name: Compile SASS to CSS
        run: |
          # Encontra todos os arquivos .scss e compila para .css no mesmo diretório
          find . -name "*.scss" -type f | while read file; do
            dir=$(dirname "$file")
            base=$(basename "$file" .scss)
            sass "$file" "$dir/$base.css"
          done
      
      - name: Prepare deployment directory
        run: |
          mkdir -p site
          # Copia todos os arquivos relevantes
          cp -r ./*.html site/ 2>/dev/null || true
          cp -r ./css site/ 2>/dev/null || true
          cp -r ./js site/ 2>/dev/null || true
          cp -r ./assets site/ 2>/dev/null || true
          cp -r ./images site/ 2>/dev/null || true
          # Se houver outras pastas, adicione
          # Verifica se index.html existe
          if [ ! -f "site/index.html" ]; then
            echo "ERRO: index.html não encontrado"
            exit 1
          fi
      
      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4